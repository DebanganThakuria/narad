global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: narad
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:18081
          - 127.0.0.1:18082
          - 127.0.0.1:18083

  - job_name: narad-tester
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9095
