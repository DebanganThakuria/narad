name: Bug report
description: Report a reproducible problem in Narad
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: input
    id: version
    attributes:
      label: Version or commit SHA
      placeholder: e.g. v0.1.0-alpha.1 or d2b203d
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Environment
      options:
        - local single-node
        - local multi-node
        - Kubernetes
        - other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the impact.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands, requests, or code needed to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant logs, stack traces, or failing responses.
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: This does not disclose a security vulnerability.
          required: true
