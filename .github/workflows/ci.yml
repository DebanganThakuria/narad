# CI runs three independent jobs in parallel: build, unit tests, e2e
# tests. Splitting them keeps logs focused and lets a failing test
# suite not mask compile errors (or vice versa). All three use the
# Go version pinned in go.mod via go-version-file, so bumping Go
# happens in one place.
name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Excludes the e2e package — that has its own job below so HTTP
      # surface failures don't get buried in unit-test output and
      # vice versa.
      - name: go test (excluding e2e)
        run: go test -race -count=1 $(go list ./... | grep -v '/tests/e2e$')

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go test (e2e only)
        run: go test -race -count=1 ./tests/e2e/...

  local-cluster-integration:
    name: Local cluster integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run 3-node cluster integration
        run: |
          ./scripts/local-cluster-e2e.sh \
            --topics 3 \
            --messages 120 \
            --produce-concurrency 12 \
            --consume-concurrency 12 \
            --timeout 2m

  local-cluster-recovery:
    name: Local cluster recovery
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run 3-node recovery scenarios
        run: ./scripts/local-cluster-recovery.sh

  local-cluster-chaos:
    name: Local cluster chaos
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run 3-node chaos smoke test
        run: |
          ./scripts/local-cluster-chaos.sh \
            --topics 2 \
            --messages 120 \
            --produce-concurrency 8 \
            --consume-concurrency 8 \
            --timeout 2m
